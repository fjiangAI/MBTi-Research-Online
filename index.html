<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MBTI-Research 科研协作测评</title>
  <meta name="description" content="无需登录、无需数据库的 MBTI-Research 科研协作测评静态版。">
  <link rel="stylesheet" href="assets/styles.css">
</head>
<body>
  <header class="site-header">
    <a class="brand" href="#top" aria-label="返回顶部">
      <span class="brand-mark">MR</span>
      <span>MBTI-Research</span>
    </a>
    <nav class="top-actions" aria-label="页面导航">
      <button class="ghost-button" type="button" data-action="scroll-test">开始测评</button>
      <button class="ghost-button" type="button" data-action="scroll-types">类型画像</button>
    </nav>
  </header>

  <main id="top">
    <section class="hero-section" aria-labelledby="hero-title">
      <div class="hero-copy">
        <p class="eyebrow">科研协作偏好 · 静态评测版</p>
        <h1 id="hero-title">MBTI-Research 科研协作测评</h1>
        <p class="hero-subtitle">93 道 A/B 题，直接在浏览器中完成评分并生成科研协作画像。无需注册、无需登录、无需数据库。</p>
        <div class="hero-actions">
          <button class="primary-button" type="button" data-action="scroll-test">开始测评</button>
          <button class="secondary-button" type="button" data-action="reset-all">清空进度</button>
        </div>
      </div>
      <div class="hero-panel" aria-label="测评概览">
        <div class="metric"><strong>93</strong><span>题目数量</span></div>
        <div class="metric"><strong>16</strong><span>协作画像</span></div>
        <div class="metric"><strong>0</strong><span>后端依赖</span></div>
      </div>
    </section>

    <section class="test-shell" id="test" aria-labelledby="test-title">
      <div class="section-heading">
        <div>
          <p class="eyebrow">Assessment</p>
          <h2 id="test-title">开始答题</h2>
        </div>
        <div class="progress-summary"><span id="answered-count">0</span>/<span id="total-count">93</span> 已完成</div>
      </div>

      <div class="progress-track" aria-hidden="true"><div class="progress-fill" id="progress-fill"></div></div>
      <div class="test-toolbar">
        <button class="icon-button" type="button" id="prev-page" aria-label="上一页">‹</button>
        <span id="page-indicator">第 1 / 10 页</span>
        <button class="icon-button" type="button" id="next-page" aria-label="下一页">›</button>
      </div>

      <form id="test-form" class="question-list"></form>

      <div class="form-actions">
        <button class="secondary-button" type="button" id="reset-page">清空本页</button>
        <button class="primary-button" type="button" id="submit-test">查看结果</button>
      </div>
    </section>

    <section class="result-section hidden" id="result" aria-live="polite"></section>

    <section class="types-section" id="types" aria-labelledby="types-title">
      <div class="section-heading">
        <div>
          <p class="eyebrow">Profiles</p>
          <h2 id="types-title">16 种科研协作画像</h2>
        </div>
      </div>
      <div class="type-grid" id="type-grid"></div>
    </section>
  </main>

  <footer class="site-footer">
    <span>MBTI-Research 静态版，结果仅供科研协作、自我理解和团队沟通参考。</span>
  </footer>

  <script src="assets/app.js"></script>
</body>
</html>
